name: Build and Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/auto-ads-backend:latest
            ghcr.io/${{ github.repository_owner }}/auto-ads-backend:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          envs: GITHUB_TOKEN
          script: |
            set -e
            # Di chuyển tới thư mục dự án
            cd ${{ secrets.VPS_PATH }}
            
            # Khắc phục lỗi "dubious ownership" của Git
            git config --global --add safe.directory ${{ secrets.VPS_PATH }} || true
            
            # Đồng bộ lại mã nguồn (reset cứng để tránh lỗi local changes)
            git fetch origin main
            git reset --hard origin/main
            
            # Chuyển vào thư mục backend chứa compose.yml
            cd backend
            
            # Đăng nhập vào GHCR trên VPS để có quyền tải image (Sửa lỗi unauthorized)
            echo $GITHUB_TOKEN | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Tắt ứng dụng PM2 cũ (nếu có) để giải phóng port 5001
            pm2 stop all || true
            
            # Tải image mới từ Registry
            docker compose pull
            
            # Restart các container
            docker compose up -d
            
            # Dọn dẹp các image cũ để tiết kiệm dung lượng
            docker image prune -f
