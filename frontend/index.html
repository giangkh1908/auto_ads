<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicon SVG với border-radius 50% -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Fallback cho các trình duyệt không hỗ trợ SVG -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/AAMS.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/AAMS.png"
    />
    <link rel="apple-touch-icon" href="/AAMS.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AAMS</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
    <script>
      // Tạo favicon bo tròn động bằng Canvas
      function createRoundFavicon() {
        const canvas = document.createElement('canvas');
        const size = 32;
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        
        // Tạo hình tròn
        ctx.beginPath();
        ctx.arc(size / 2, size / 2, size / 2, 0, 2 * Math.PI);
        ctx.clip(); // Clip để bo tròn
        
        // Load và vẽ ảnh
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = function() {
          ctx.drawImage(img, 0, 0, size, size);
          // Cập nhật favicon
          const link = document.querySelector("link[rel*='icon']") || document.createElement('link');
          link.type = 'image/png';
          link.rel = 'shortcut icon';
          link.href = canvas.toDataURL();
          document.getElementsByTagName('head')[0].appendChild(link);
        };
        img.src = './src/assets/AAMS.png';
      }
      
      // Chạy khi trang load
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', createRoundFavicon);
      } else {
        createRoundFavicon();
      }
    </script>
  </body>
</html>
